primitive_root: ../../outputs/primitives/full
planner_checkpoint: ""
output_root: ../../outputs/diffusion
experiment_name: Sonata-3-full-diffusion
wandb:
  enabled: true
  project: robopianist
  entity: tnguyen31-santa-clara-university
  mode: online
  tags: ["sonata", "diffusion", "full"]
seed: 7
device: cuda
resume: false
deterministic_eval: true
variant: full

context_length: 64
batch_size: 64
num_workers: 4
epochs: 30
learning_rate: 0.0001
weight_decay: 0.0001
action_horizon: 32
state_context_steps: 8

model_dim: 256
num_blocks: 10
diffusion_steps: 100
beta_start: 0.0001
beta_end: 0.02
predict_residual: true
note_loss_weight: 1.0
hold_loss_weight: 0.5
imitation_weight: 0.25
smoothness_weight: 0.02
residual_reg_weight: 0.05
diffusion_weight: 0.25
false_negative_weight: 4.0
false_positive_weight: 1.0
surrogate_ridge_lambda: 0.01
checkpoint_interval: 2

family_mapping_mode: heuristic_stats
continuous_param_names: ["motion_energy", "chord_size", "start_state_norm", "end_state_norm"]

planner_embedding_dim: 384
primitive_embedding_dim: 160
planner_nhead: 8
planner_layers: 8
planner_ffn: 1024
planner_dropout: 0.1
