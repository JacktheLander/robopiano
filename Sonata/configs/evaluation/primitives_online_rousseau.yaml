primitive_root: null
output_root: null
robopianist_root: null
seed: 7
resume: true
force: false
save_plots: true
save_debug: true
rollout_device: cpu

sampling:
  split: null
  max_instances: null
  instances_per_primitive: 1
  primitive_ids: []
  min_chord_size: null
  max_chord_size: null
  min_duration_steps: null
  max_duration_steps: null

events:
  use_goals: true
  use_piano_states: true
  goal_key_threshold: 0.5
  goal_sustain_threshold: 0.5
  piano_state_threshold: 0.5
  piano_sustain_threshold: 0.5
  onset_tolerance_frames: 1

rollout:
  source_mode: example_midi_pool
  example_environment_names:
    - RoboPianist-debug-TwinkleTwinkleRousseau-v0
    - RoboPianist-debug-NocturneRousseau-v0
  example_midi_paths:
    - music/data/rousseau/twinkle-twinkle-trimmed.mid
    - music/data/rousseau/nocturne-trimmed.mid
  validate_action_dim: true

aggregation:
  top_k_examples: 3
  max_plot_primitives: 24
