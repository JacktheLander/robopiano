output_root: ../../outputs/primitives/debug
data_output_root: ../../outputs/data/debug
data_manifest_name: dataset_manifest
experiment_name: Sonata-3-debug-primitives
wandb:
  enabled: true
  project: robopianist
  entity: tnguyen31-santa-clara-university
  mode: online
  tags: ["sonata", "primitives", "debug"]
seed: 7
force: false
segmenter_name: keyset_onset
segmentation_strategy: keyset_onset
window_steps: 24
stride_steps: 12
pre_steps: 2
post_steps: 6
