experiment_name: full_tuned
run_name: full_tuned
seed: 42
extraction_root: Variations/outputs/extraction/full
output_root: Variations/outputs/diffusion
splits:
  val_fraction: 0.1
  seed: 42
  min_pairs_per_split: 1000
data:
  batch_size: 512
  num_workers: 4
model:
  hidden_dim: 512
  num_blocks: 8
  time_dim: 256
  cond_dim: 512
diffusion:
  timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  ddim_steps: 75
training:
  epochs: 300
  learning_rate: 0.000075
  weight_decay: 0.0001
  warmup_epochs: 5
  amp: true
  ema_decay: 0.9995
  val_every: 1
  checkpoint_interval: 5
  best_of_k: 16
  max_val_batches: 32
  sample_artifact_count: 32
  device: auto
wandb:
  enabled: true
  project: variations
  job_type: diffusion
  tags:
    - variations
    - diffusion
    - rp1m-full
    - tuned
  log_artifacts: true
  watch_model: true
  watch_log: gradients
  watch_log_freq: 100
