experiment_name: mlp_baseline_joints_tuned
model_type: mlp_baseline
seed: 42
extraction_root: Variations/outputs/extraction/full
splits:
  val_fraction: 0.1
  seed: 42
  min_pairs_per_split: 1000
data:
  output_mode: joints_with_fingertips
  batch_size: 512
  num_workers: 4
model:
  input_dim: 88
  output_dim: 76
  hidden_dims: [192, 384, 384, 192]
  dropout: 0.15
  activation: gelu
  hidden_mult: 2
training:
  epochs: 100
  learning_rate: 0.0002
  weight_decay: 0.0005
  grad_clip_norm: 1.0
  early_stopping_patience: 8
  device: auto
loss:
  joints_weight: 1.0
  active_fingertip_weight: 2.0
  target_key_contact_weight: 5.0
logging:
  output_root: Variations/outputs/mlp_baseline
  run_name: joints_tuned
  use_wandb: true
  project: variations
  tags: [variations, mlp-baseline, joints-only, tuned]
