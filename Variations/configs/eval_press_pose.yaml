extraction_root: Variations/outputs/extraction/full
splits:
  val_fraction: 0.1
  seed: 42
  min_pairs_per_split: 1000
data:
  batch_size: 512
  num_workers: 4
evaluation:
  split: val
  max_samples: null
  diffusion_steps: 75
  # null = use checkpoint's training.best_of_k (same procedure as W&B val_x0_mse_best_of_k).
  # Set to 1 for a cheap single-sample baseline (will not match W&B).
  diffusion_best_of_k: null
  diffusion_samples: 1
  device: auto
fingertip_eval:
  max_samples: 256
  settle_steps: 5
logging:
  output_root: Variations/outputs/comparisons
  filename: press_pose_tuned_metrics.csv
