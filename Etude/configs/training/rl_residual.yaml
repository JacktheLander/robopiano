training:
  mode: rl_residual

rollout_training:
  enabled: false
  replay_buffer_capacity: 100000
  failure_only_sampling: false
  failure_window_size: 8

residual_policy:
  enabled: false
  action_dim: 10

reward:
  target_key_activation: 2.0
  missed_key: -3.0
  wrong_key: -2.0
  residual_l2: -0.01
  action_l2: -0.005
