fingertip_control:
  enabled: true
  use_fingertip_error_features: true
  use_fingertip_weights: true
  use_active_finger_mask: true
  use_inactive_finger_mask: true
  flatten: true
  allow_missing: true

phase:
  enabled: true
  source: metadata
  encode_as: both
  include_mask: true
  allow_missing: true
  phase_names:
    - idle
    - approach
    - press
    - release
